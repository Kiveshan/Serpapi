name: E2E Tests

on:
  push:
    branches: [main, develop, testing-e2e]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: serpapi-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      # Database — points to the service container above
      DB_USER: postgres
      DB_PASSWORD: testpassword
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: serpapi-test
      # Auth
      JWT_SECRET: e2e-test-jwt-secret-not-for-production
      PORT: 5001
      # AWS — fake values. Registration tests mock the /api/auth/register endpoint,
      # so no real S3 call is ever made during the E2E suite.
      AWS_ACCESS_KEY_ID: mock
      AWS_SECRET_ACCESS_KEY: mock
      AWS_REGION: us-east-1
      AWS_S3_BUCKET_NAME: e2e-mock-bucket
      # Frontend
      REACT_APP_API_URL: http://localhost:5001/api
      # Playwright
      E2E_BASE_URL: http://localhost:3000
      E2E_API_URL: http://localhost:5001/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      # Install only Chromium — sufficient for the E2E suite.
      # --with-deps installs OS-level libraries (libglib, nss, etc.)
      # that are absent from the ubuntu-latest runner by default.
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Apply the database schema so the tables exist before seeding
      - name: Apply DB schema
        working-directory: server
        run: node -e "
          const { pool } = require('./db/db');
          const schema = \`
            CREATE TABLE IF NOT EXISTS institution (
              instid SERIAL PRIMARY KEY,
              institution VARCHAR(255),
              region VARCHAR(255),
              country VARCHAR(255)
            );
            CREATE TABLE IF NOT EXISTS roles (
              roleid SERIAL PRIMARY KEY,
              rolename VARCHAR(100)
            );
            CREATE TABLE IF NOT EXISTS user_table (
              userid SERIAL PRIMARY KEY,
              fullname VARCHAR(255),
              institutionid INT REFERENCES institution(instid),
              institutionemail VARCHAR(255) UNIQUE,
              password VARCHAR(255),
              roleid INT REFERENCES roles(roleid),
              certificatelink TEXT,
              otherinstitution TEXT,
              enabled BOOLEAN DEFAULT false,
              status VARCHAR(50) DEFAULT 'pending',
              dateentered DATE
            );
            INSERT INTO roles (roleid, rolename) VALUES (1, 'System Admin'), (2, 'Researcher')
            ON CONFLICT (roleid) DO NOTHING;
          \`;
          pool.query(schema).then(() => { console.log('Schema applied'); pool.end(); }).catch(e => { console.error(e); process.exit(1); });
        "

      - name: Run E2E tests
        run: npx playwright test

      # Upload the HTML report even when tests fail — that is exactly when you need it
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/reports/html/
          retention-days: 14

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: e2e/reports/results.xml
          retention-days: 14

      # Renders a pass/fail summary directly in the GitHub PR checks UI
      - name: Publish test summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright E2E Results
          path: e2e/reports/results.xml
          reporter: java-junit
          fail-on-error: false
